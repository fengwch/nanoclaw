# 复制为 secret.yaml 并填入真实值，不要提交 secret.yaml
# kubectl create secret generic nanoclaw-secret --from-env-file=.env -n nanoclaw --dry-run=client -o yaml > k8s/secret.yaml
#
# 或手动创建，必须包含的 key 示例：
apiVersion: v1
kind: Secret
metadata:
  name: nanoclaw-secret
  namespace: nanoclaw
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-xxx"
  FEISHU_APP_SECRET: "xxx"
  # 其他 .env 中的敏感项
